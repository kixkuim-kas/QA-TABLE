<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* すべてのサイズを画面全体の横幅（vw）基準にすることで、古いブラウザでも絶対にフリーズせず、比率を維持して巨大化します */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 2vw; 
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            margin-bottom: 2vw;
        }
        .header h1 {
            color: #002f6c;
            font-size: 3.5vw; /* タイトルを大画面用に大きく */
            margin: 0;
            line-height: 1.2;
        }
        .sub-title {
            color: #002f6c;
            font-size: 1.8vw; 
            font-weight: bold;
            margin: 0;
            line-height: 1.2;
        }
        .header img {
            height: 4.5vw; 
            margin-right: 1.5vw;
            float: left;
        }
        /* ロゴとタイトルの横並び崩れ防止 */
        .title-with-logo::after {
            content: "";
            display: block;
            clear: both;
        }

        /* フリーズの原因となるGridを廃止し、最も確実で軽量なFlexboxに変更 */
        .main-container {
            width: 100%; 
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 左側：表エリア（全体の50%の幅に固定してはみ出しを防止） */
        .table-section {
            width: 50%;
            min-width: 0;
            overflow-x: auto; 
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.2vw; /* サイネージ向けに表の文字を大きく */
            margin-bottom: 2.5vw; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td {
            text-align: left;
            padding: 1.2vw 1.5vw; /* 線の隙間を広げて遠くからでも見やすく */
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        th {
            background-color: #002f6c;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) td {
            background-color: #f2f2f2;
        }
        th:first-child { text-align: left; }
        th:not(:first-child), td:not(:first-child) { text-align: center; }

        /* 右側：グラフエリア（vwで縦横のサイズを完全に固定し、画面外への切切れを防ぎます） */
        .chart-section {
            width: 42vw;       /* 画面幅の42%の正方形に完全固定 */
            height: 42vw;      
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            
            background-image: url('bg-logo.png');
            background-repeat: no-repeat;
            background-position: left center; 
            background-size: 140%; 
        }

        .chart-container {
            width: 100%; 
            height: 100%;
            position: relative;
            background-color: rgba(255, 255, 255, 0.65); 
            border-radius: 50%;
            box-sizing: border-box;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* グラフ中央のテキスト */
        .chart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 95%;
            
            text-shadow: 
                0 0 1vw rgba(255, 255, 255, 1),
                0 0 2vw rgba(255, 255, 255, 1),
                0.2vw 0.2vw 0.5vw rgba(255, 255, 255, 1), 
                -0.2vw -0.2vw 0.5vw rgba(255, 255, 255, 1);
        }
        
        /* エラーの原因となったcqi単位を廃止し、確実・強力に拡大するvw単位に統一 */
        .text-line1 {
            color: #d32f2f;
            font-size: 2.2vw; 
            font-weight: bold;
            line-height: 1.3;
        }
        .text-line2 {
            color: #002f6c;
            font-size: 6.5vw; /* 数字をサイネージ用に超特大サイズに変更 */
            font-weight: bold;
            margin-top: 0.5vw;
            line-height: 1;
        }
        .text-line3 {
            color: #00bfff;
            font-size: 2.8vw; 
            font-weight: bold;
            margin-top: 1vw;
        }

        /* スマホ等で見た場合の見やすさも一応維持 */
        @media (max-width: 1000px) {
            .main-container {
                flex-direction: column;
            }
            .table-section {
                width: 100%;
            }
            .chart-section {
                width: 80vw;
                height: 80vw;
            }
            .text-line1 { font-size: 4vw; }
            .text-line2 { font-size: 12vw; }
            .text-line3 { font-size: 5vw; }
        }

        .status-message { margin-top: 2vw; font-size: 2vw; color: #777; font-weight: bold; }
        .error-msg { color: #d32f2f; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-with-logo">
            <img src="bg-logo.png" alt="KAS Logo">
            <div>
                <h1>KAS Accident/Incident Information</h1>
                <div class="sub-title">KANSAI AIRPORTS Aviation Services</div>
            </div>
        </div>
    </div>

    <div id="loading" class="status-message">データを読み込み中...</div>

    <div class="main-container" id="main-container" style="display: none;">
        <div class="table-section" id="table-section"></div>
        
        <div class="chart-section">
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
                <div class="chart-text">
                    <div class="text-line1">制限区域内<br>無事故日数目標</div>
                    <div class="text-line2"><span id="goal-days-display">...</span>日 <span style="font-size: 0.3em; vertical-align: middle;">以上</span></div>
                    <div class="text-line3"><span id="current-days-display">...</span>日 継続中！</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRju7RHJ7_5PMGhXmQhcnCs5S6YiAwLY-mVASp8wbhF7l0oCj2PyRN51IAOdoJQGboNAOZiIhNI4mKh/pub?output=csv';
        let myChart = null;

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => line.split(',').map(cell => cell.trim().replace(/^"(.*)"$/, '$1')));
        }
