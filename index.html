<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ヘッダー周り */
        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #002f6c;
            font-size: 2.5em;
            margin: 0;
            line-height: 1.2;
        }

        /* メインコンテナ */
        .main-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
        }

        /* 左側：表（テーブル）エリア */
        .table-section {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
            margin-bottom: 30px; /* 表と表の間に余白を作る */
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td {
            text-align: left;
            padding: 12px 15px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        th {
            background-color: #002f6c;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) td {
            background-color: #f2f2f2;
        }
        th:first-child { text-align: left; }
        th:not(:first-child), td:not(:first-child) { text-align: center; }

        /* 右側：グラフと背景ロゴ */
        .chart-section {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            background-image: url('bg-logo.png');
            background-repeat: no-repeat;
            background-position: center center;
            background-size: 80%; 
        }

        .chart-container {
            width: 85%;
            aspect-ratio: 1 / 1;
            position: relative;
            background-color: rgba(255, 255, 255, 0.7); 
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* グラフ中央のテキスト */
        .chart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 90%;
            text-shadow: 2px 2px 4px rgba(255, 255, 255, 1), -2px -2px 4px rgba(255, 255, 255, 1);
        }
        .text-line1 {
            color: #d32f2f;
            font-size: 1.5em;
            font-weight: bold;
            line-height: 1.2;
        }
