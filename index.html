<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ヘッダー周り */
        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #002f6c; /* 紺色 */
            font-size: 2.5em;
            margin: 0;
            line-height: 1.2;
        }
        .header img {
            height: 50px;
            margin-top: 10px;
        }

        /* メインコンテナ */
        .main-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
        }

        /* 左側：表（テーブル） */
        .table-section {
            flex: 1.5;
            overflow-x: auto;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        th, td {
            text-align: left;
            padding: 10px 15px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        th {
            background-color: #002f6c; /* 紺色 */
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) td {
            background-color: #f2f2f2; /* 交互の薄グレー */
        }
        th:first-child { text-align: left; }
        th:not(:first-child) { text-align: right; }
        td:not(:first-child) { text-align: right; }

        /* 右側：グラフと背景図形 */
        .chart-section {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        /* 装飾的な背景図形 */
        .chart-section::before {
            content: '';
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 130%;
            height: 130%;
            background-color: #002f6c;
            border-radius: 50%;
            z-index: -2;
        }
        .chart-section::after {
            content: '';
            position: absolute;
            bottom: 0;
            right: 0;
            width: 70%;
            height: 100%;
            background: linear-gradient(135deg, rgba(0,0,0,0) 0%, rgba(0,47,108,1) 50%, rgba(0,191,255,1) 100%);
            z-index: -1;
            transform: skew(-20deg) translateX(20%);
        }

        .chart-container {
            width: 80%;
            aspect-ratio: 1 / 1;
            position: relative;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* グラフ中央のテキスト */
        .chart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 80%;
        }
        .text-line1 {
            color: #d32f2f; /* 赤 */
            font-size: 1em;
            font-weight: bold;
        }
        .text-line2 {
            color: #002f6c; /* 紺 */
            font-size: 2.2em;
            font-weight: bold;
            margin-top: 5px;
        }
        .text-line3 {
            color: #00bfff; /* 水色 */
            font-size: 1.2em;
            font-weight: bold;
            margin-top: -5px;
        }

        /* レスポンシブ対応 */
        @media (max-width: 768px) {
            .main-container {
                flex-direction: column;
                align-items: center;
                gap: 20px;
            }
            .header h1 { font-size: 2em; }
            .chart-container { width: 90%; }
        }

        /* 読み込み中・エラーメッセージ */
        .status-message {
            margin-top: 20px;
            font-size: 1.2em;
            color: #777;
        }
    </style>
</head>
<body>

    <div class="header">
        <h1>KAS Accident/Incident Information</h1>
        <img src="logo.png" alt="Kansai Airports Aviation Services">
    </div>

    <div class="main-container" id="main-container" style="display: none;">
        <div class="table-section">
            <table id="data-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
        </div>
        
        <div class="chart-section">
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
                <div class="chart-text">
                    <div class="text-line1">制限区域内<br>無事故日数目標</div>
                    <div class="text-line2"><span id="goal-days-display">XXX</span>日 以上</div>
                    <div class="text-line3"><span id="current-days-display">YYY</span>日 継続中！</div>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="status-message">データを読み込み中...</div>
    <div id="error" class="status-message" style="color: #d32f2f; display: none;">データの取得に失敗しました。公開設定を確認してください。</div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRju7RHJ7_5PMGhXmQhcnCs5S6YiAwLY-mVASp8wbhF7l0oCj2PyRN51IAOdoJQGboNAOZiIhNI4mKh/pub?output=csv';

        // CSVデータを解析する関数
        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => line.split(',').map(cell => cell.trim().replace(/^"(.*)"$/, '$1')));
        }

        async function loadData() {
            try {
                const response = await fetch(csvUrl);
                if (!response.ok) throw new Error('Network response was not ok');
                const dataText = await response.text();
                const data = parseCSV(dataText);

                // 空行を除外
                const validData = data.filter(row => row.length > 0 && row.some(cell => cell !== ""));

                if (validData.length === 0) {
                    document.getElementById('loading').innerText = 'スプレッドシートが空です。';
                    return;
                }

                // データを画面に反映
                updateUI(validData);

            } catch (error) {
                console.error('Fetch error:', error);
                document.getElementById('loading').style.display = 'none';
                document.getElementById('error').style.display = 'block';
            }
        }

        function updateUI(data) {
            // データのインデックス（スプレッドシートの構造に合わせて調整してください）
            // 画像の例に基づいて、特定のセルからデータを抽出します。
            
            // 例：制限区域内無事故日数の目標日数はG列（インデックス6）、現在日数はH列（インデックス7）
            // これらがデータ行のどこにあるかを特定する必要があります。
            // ここでは仮に、2行目（データ開始行）のこれらの列から取得するとします。
            
            // 目標日数、現在日数を取得
            let goalDays = 101; // デフォルト値
            let currentDays = 58; // デフォルト値

            // データの特定の行と列からデータを抽出するロジックを追加
            // 例: KPIデータの抽出
            const tableDataRows = data.slice(1); // 1行目はヘッダー
            const tableBody = document.getElementById('table-body');
            const tableHead = document.getElementById('table-head');
            
            // テーブルのヘッダーを作成
            const headerRow = document.createElement('tr');
            ['Safety KPI 安全実績指標', '目標', '現在'].forEach(headerText => {
                const th = document.createElement('th');
                th.textContent = headerText;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            // テーブルのデータ行を作成（画像の例を基にデータをマッピング）
            const kpiMapping = [
                { kpi: '航空機ダメージ、管制指示違反、無許可侵入', goalCol: 1, currentCol: 2 },
                { kpi: '航空機ロードエラー', goalCol: 1, currentCol: 2 },
                { kpi: '物損', goalCol: 1, currentCol: 2 },
                { kpi: '休業労災件数 (LTIR)', goalCol: 1, currentCol: 2 },
                { kpi: '労災休業日数 (SR)', goalCol: 1, currentCol: 2 },
                { kpi: 'ミスチェックイン', goalCol: 1, currentCol: 2 },
            ];

            // データの特定の行にこれらのKPIデータが含まれていると仮定
            // ここでは画像の例をハードコードしていますが、
            // 実際には、data配列から対応する行を見つけてデータを抽出します。
            const hardcodedKpiData = [
                ['航空機ダメージ、管制指示違反、無許可侵入', '0件', '1件'],
                ['航空機ロードエラー', '9件以下', '5件'],
                ['物損', '23件以下', '5件'],
                ['休業労災件数 (LTIR)', '13件以下', '5件'],
                ['労災休業日数 (SR)', '323日以下', '56日'],
                ['ミスチェックイン', '78件以下', '21件']
            ];

            hardcodedKpiData.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            // チャート中央のテキストを更新
            document.getElementById('goal-days-display').textContent = goalDays;
            document.getElementById('current-days-display').textContent = currentDays;

            // Chart.js でドーナツチャートを描画
            const ctx = document.getElementById('doughnutChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [currentDays, goalDays - currentDays], // [現在日数, 残り日数]
                        backgroundColor: [
                            '#00bfff', // 水色 (現在)
                            '#002f6c'  // 紺色 (目標まで)
                        ],
                        borderColor: '#ffffff',
                        borderWidth: 2,
                    }]
                },
                options: {
                    cutout: '80%', // ドーナツの太さ
                    plugins: {
                        legend: { display: false },
                        tooltip: { enabled: false },
                    },
                    maintainAspectRatio: true,
                    responsive: true,
                }
            });

            // 読み込み完了、表示を切り替え
            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
        }

        window.onload = loadData;
    </script>
</body>
</html>
