<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            overflow-x: hidden; /* 横スクロールを防止 */
        }

        .header {
            width: 98%;
            max-width: 1800px; /* 大画面にも対応 */
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #002f6c;
            font-size: 2.5em;
            margin: 0;
            line-height: 1.2;
        }

        .main-container {
            width: 98%; /* 画面幅いっぱいまで使う */
            max-width: 1800px;
            display: grid;
            grid-template-columns: 1fr 1.3fr; /* グラフ側(右)を大幅に広く確保 */
            gap: 40px; 
            align-items: center;
        }

        .table-section {
            min-width: 0; 
            overflow-x: auto; 
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.05em; 
            margin-bottom: 30px; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td {
            text-align: left;
            padding: 14px 15px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        th {
            background-color: #002f6c;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) td {
            background-color: #f2f2f2;
        }
        th:first-child { text-align: left; }
        th:not(:first-child), td:not(:first-child) { text-align: center; }

        /* 右側：グラフエリア */
        .chart-section {
            min-width: 0;
            width: 100%;
            /* ★画面の高さ(vh)に合わせて限界まで自動拡大する魔法の設定 */
            max-width: min(1000px, 80vh); 
            margin: 0 auto;
            aspect-ratio: 1 / 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            
            background-image: url('bg-logo.png');
            background-repeat: no-repeat;
            background-position: left center; /* 左寄せ */
            background-size: 150%; /* 背景ロゴも特大化して画面いっぱいに */
            
            /* ★グラフの拡大に合わせて文字も自動拡大させる最新機能 */
            container-type: inline-size; 
        }

        .chart-container {
            width: 95%; /* 枠いっぱいまで円を広げる */
            height: 95%;
            position: relative;
            background-color: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(3px); /* 磨りガラス効果で文字を読みやすく */
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* グラフ中央のテキスト */
        .chart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 95%;
            
            /* ★白い発光（フチドリ）を最強にして、どんな背景でも読めるように */
            text-shadow: 
                0 0 15px rgba(255, 255, 255, 1),
                0 0 30px rgba(255, 255, 255, 1),
                2px 2px 5px rgba(255, 255, 255, 1), 
                -2px -2px 5px rgba(255, 255, 255, 1);
        }
        
        /* フォントサイズを「cqi（グラフの横幅に対する割合）」にすることで、グラフの巨大化に完全連動します */
        .text-line1 {
            color: #d32f2f;
            font-size: 4.5cqi; 
            font-weight: bold;
            line-height: 1.2;
        }
        .text-line2 {
            color: #002f6c;
            font-size: 13cqi; /* 特大サイズに連動 */
            font-weight: bold;
            margin-top: 2cqi;
            line-height: 1;
        }
        .text-line3 {
            color: #00bfff;
            font-size: 6cqi; 
            font-weight: bold;
            margin-top: 3cqi;
        }

        @media (max-width: 1000px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .chart-section {
                max-width: 90vw;
            }
        }

        .status-message { margin-top: 20px; font-size: 1.2em; color: #777; font-weight: bold; }
        .error-msg { color: #d32f2f; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KAS Accident/Incident Information</h1>
        <div class="title-with-logo" style="display: flex; align-items: center; margin-top: 5px;">
            <img src="bg-logo.png" alt="KAS Logo" style="height: 40px; margin-right: 15px;">
            <div class="sub-title" style="color: #002f6c; font-size: 1.5em; font-weight: bold; margin: 0;">KANSAI AIRPORTS<br>Aviation Services</div>
        </div>
    </div>

    <div id="loading" class="status-message">データを読み込み中...</div>

    <div class="main-container" id="main-container" style="display: none;">
        <div class="table-section" id="table-section"></div>
        
        <div class="chart-section">
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
                <div class="chart-text">
                    <div class="text-line1">制限区域内<br>無事故日数目標</div>
                    <div class="text-line2"><span id="goal-days-display">...</span>日 <span style="font-size: 0.3em; vertical-align: middle;">以上</span></div>
                    <div class="text-line3"><span id="current-days-display">...</span>日 継続中！</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRju7RHJ7_5PMGhXmQhcnCs5S6YiAwLY-mVASp8wbhF7l0oCj2PyRN51IAOdoJQGboNAOZiIhNI4mKh/pub?output=csv';
        let myChart = null;

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => line.split(',').map(cell => cell.trim().replace(/^"(.*)"$/, '$1')));
        }

        async function loadData() {
            try {
                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                if (!response.ok) throw new Error('ネットワークエラー');
                const dataText = await response.text();
                const data = parseCSV(dataText);
                updateUI(data);
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '<span class="error-msg">データの取得に失敗しました。</span>';
            }
        }

        function updateUI(data) {
            try {
                const tableSection = document.getElementById('table-section');
                tableSection.innerHTML = ''; 

                function createTable(headers, rows) {
                    const table = document.createElement('table');
                    const thead = document.createElement('thead');
                    const trHead = document.createElement('tr');
                    headers.forEach(text => {
                        const th = document.createElement('th');
                        th.textContent = text;
                        trHead.appendChild(th);
                    });
                    thead.appendChild(trHead);
                    table.appendChild(thead);

                    const tbody = document.createElement('tbody');
                    rows.forEach(row => {
                        const tr = document.createElement('tr');
                        row.forEach(text => {
                            const td = document.createElement('td');
                            td.textContent = text;
                            tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                    table.appendChild(tbody);
                    tableSection.appendChild(table);
                }

                if (data[1] && data[2]) createTable(data[1].slice(0, 3), [data[2].slice(0, 3)]);
                if (data[4] && data[5]) createTable(data[4].slice(0, 4), [data[5].slice(0, 4)]);
                if (data[7]) {
                    const kpiRows = [];
                    for (let i = 8; i < data.length; i++) {
                        if (!data[i] || data[i][0] === "") break; 
                        kpiRows.push(data[i].slice(0, 3));
                    }
                    createTable(data[7].slice(0, 3), kpiRows);
                }

                /* B16・B17から数字を取得する処理 */
                let goalDays = 105;
                let currentDays = 100;

                if (data.length > 15 && data[15] && data[15].length > 1) {
                    const b16Value = parseInt(data[15][1], 10);
                    if (!isNaN(b16Value)) goalDays = b16Value;
                }
                if (data.length > 16 && data[16] && data[16].length > 1) {
                    const b17Value = parseInt(data[16][1], 10);
                    if (!isNaN(b17Value)) currentDays = b17Value;
                }

                document.getElementById('goal-days-display').textContent = goalDays;
                document.getElementById('current-days-display').textContent = currentDays;

                const remainingDays = Math.max(0, goalDays - currentDays); 

                if (myChart) myChart.destroy(); 
                const ctx = document.getElementById('doughnutChart').getContext('2d');
                myChart = new Chart(ctx, {
                    type: 'doughnut',
                    data: {
                        datasets: [{
                            data: [currentDays, remainingDays],
                            backgroundColor: ['#00bfff', '#e0e0e0'], 
                            borderWidth: 0,
                        }]
                    },
                    options: {
                        cutout: '85%',
                        plugins: { tooltip: { enabled: false } },
                        maintainAspectRatio: true,
                        responsive: true,
                    }
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-container').style.display = 'grid';

            } catch (err) {
                console.error(err);
                document.getElementById('loading').innerHTML = '<span class="error-msg">データの表示中にエラーが発生しました。</span>';
            }
        }

        window.onload = loadData;
    </script>
</body>
</html>
