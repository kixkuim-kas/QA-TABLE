<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* ヘッダー周り */
        .header {
            width: 100%;
            max-width: 1200px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 20px;
        }
        .header h1 {
            color: #002f6c;
            font-size: 2.5em;
            margin: 0;
            line-height: 1.2;
        }

        /* メインコンテナ */
        .main-container {
            width: 100%;
            max-width: 1200px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 40px;
        }

        /* 左側：表（テーブル）エリア */
        .table-section {
            flex: 1.5;
            display: flex;
            flex-direction: column;
            gap: 30px;
            overflow-x: auto;
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.95em;
        }
        th, td {
            text-align: left;
            padding: 10px 15px;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        th {
            background-color: #002f6c;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) td {
            background-color: #f2f2f2;
        }
        th:first-child { text-align: left; }
        th:not(:first-child), td:not(:first-child) { text-align: center; }

        .sub-table-container table {
            margin-bottom: 15px;
        }
        .sub-table-container td {
            background-color: #e6e6e6 !important;
        }

        /* 右側：グラフと【背景ロゴ】 */
        .chart-section {
            flex: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            
            /* ======== ピンクと水色のロゴ（logo.png）を背景に設定 ======== */
            background-image: url('logo.png');
            background-repeat: no-repeat;
            background-position: center center;
            /* ロゴが大きすぎないようにサイズを調整（80%） */
            background-size: 80%; 
        }

        .chart-container {
            width: 85%;
            aspect-ratio: 1 / 1;
            position: relative;
            /* グラフと文字が背景ロゴと同化して読みにくくならないよう、白い半透明の丸を敷きます */
            background-color: rgba(255, 255, 255, 0.9); 
            border-radius: 50%;
            padding: 10px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* グラフ中央のテキスト */
        .chart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 70%;
        }
        .text-line1 {
            color: #d32f2f;
            font-size: 1.1em;
            font-weight: bold;
        }
        .text-line2 {
            color: #002f6c;
            font-size: 2.5em;
            font-weight: bold;
            margin-top: 5px;
        }
        .text-line3 {
            color: #00bfff;
            font-size: 1.2em;
            font-weight: bold;
            margin-top: -5px;
        }

        .status-message { margin-top: 20px; font-size: 1.2em; color: #777; }
    </style>
</head>
<body>

    <div class="header">
        <h1>KAS Accident/Incident Information</h1>
        <div class="title-with-logo" style="display: flex; align-items: center; margin-top: 5px;">
            <img src="logo.png" alt="KAS Logo" style="height: 40px; margin-right: 15px;">
            <div class="sub-title" style="color: #002f6c; font-size: 1.5em; font-weight: bold; margin: 0;">KANSAI AIRPORTS<br>Aviation Services</div>
        </div>
    </div>

    <div class="main-container" id="main-container" style="display: none;">
        
        <div class="table-section">
            <table id="data-table">
                <thead id="table-head"></thead>
                <tbody id="table-body"></tbody>
            </table>
            <div class="sub-table-container" id="sub-tables"></div>
        </div>
        
        <div class="chart-section">
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
                <div class="chart-text">
                    <div class="text-line1">制限区域内<br>無事故日数目標</div>
                    <div class="text-line2"><span id="goal-days-display">101</span>日 <span style="font-size: 0.5em;">以上</span></div>
                    <div class="text-line3"><span id="current-days-display">58</span>日 継続中！</div>
                </div>
            </div>
        </div>
    </div>

    <div id="loading" class="status-message">データを読み込み中...</div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRju7RHJ7_5PMGhXmQhcnCs5S6YiAwLY-mVASp8wbhF7l0oCj2PyRN51IAOdoJQGboNAOZiIhNI4mKh/pub?output=csv';

        async function loadData() {
            try {
                updateUI();
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerText = 'エラーが発生しました。';
            }
        }

        function updateUI() {
            /* 1番目のデータ（KPI）の生成 */
            const tableHead = document.getElementById('table-head');
            const tableBody = document.getElementById('table-body');
            
            const headerRow = document.createElement('tr');
            ['Safety KPI 安全実績指標', '目標', '現在'].forEach(text => {
                const th = document.createElement('th');
                th.textContent = text;
                headerRow.appendChild(th);
            });
            tableHead.appendChild(headerRow);

            const kpiData = [
                ['航空機ダメージ、管制指示違反、無許可侵入', '0件', '1件'],
                ['航空機ロードエラー', '9件以下', '5件'],
                ['物損', '23件以下', '5件'],
                ['休業労災件数 (LTIR)', '13件以下', '5件'],
                ['労災休業日数 (SR)', '323日以下', '56日'],
                ['ミスチェックイン', '78件以下', '21件']
            ];

            kpiData.forEach(row => {
                const tr = document.createElement('tr');
                row.forEach(cell => {
                    const td = document.createElement('td');
                    td.textContent = cell;
                    tr.appendChild(td);
                });
                tableBody.appendChild(tr);
            });

            /* 2番目のデータ（追加分）の生成 */
            const subTablesContainer = document.getElementById('sub-tables');
            const additionalData = [
                { title: '制限区域内無事故日数目標', label: '全空港(KIX/HND/UKB)', goal: '101', current: '3' },
                { title: '無事故連続日数', label: 'KIX', goal: '101', current: '3' },
                { title: '無事故連続日数', label: 'HND', goal: '101', current: '3' },
                { title: '無事故連続日数', label: 'UKB', goal: '101', current: '3' }
            ];

            additionalData.forEach(data => {
                const table = document.createElement('table');
                table.innerHTML = `
                    <thead>
                        <tr>
                            <th style="width: 50%;">${data.title}</th>
                            <th style="width: 25%;">目標（日数）</th>
                            <th style="width: 25%;">現在（件数）</th>
                        </tr>
                    </thead>
                    <tbody>
                        <tr>
                            <td>${data.label}</td>
                            <td>${data.goal}</td>
                            <td>${data.current}</td>
                        </tr>
                    </tbody>
                `;
                subTablesContainer.appendChild(table);
            });

            /* グラフの描画 */
            const currentDays = 58;
            const goalDays = 101;
            
            const ctx = document.getElementById('doughnutChart').getContext('2d');
            new Chart(ctx, {
                type: 'doughnut',
                data: {
                    datasets: [{
                        data: [currentDays, goalDays - currentDays],
                        backgroundColor: ['#00bfff', '#e0e0e0'], 
                        borderWidth: 0,
                    }]
                },
                options: {
                    cutout: '85%',
                    plugins: { tooltip: { enabled: false } },
                    maintainAspectRatio: true,
                    responsive: true,
                }
            });

            document.getElementById('loading').style.display = 'none';
            document.getElementById('main-container').style.display = 'flex';
        }

        window.onload = loadData;
    </script>
</body>
</html>
