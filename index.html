<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #ffffff;
            margin: 0;
            padding: 1vw;
            height: 100vh; /* 画面の高さを基準にする */
            box-sizing: border-box;
            overflow: hidden; /* 画面からはみ出した分は隠して強制的に収める */
        }

        .header {
            height: 10vh; /* ヘッダーを高さの10%に固定 */
            display: flex;
            align-items: center;
            margin-bottom: 1vh;
        }
        .header img { height: 8vh; margin-right: 1vw; }
        .header h1 { font-size: 3vh; color: #002f6c; margin: 0; }

        /* メインエリア：画面の残り90%の高さに収める */
        .main-container {
            height: 88vh; 
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 2vw;
        }

        .table-section {
            width: 55%;
            height: 100%;
            overflow-y: auto; /* 表が長い場合はここだけスクロール */
        }
        
        table { width: 100%; border-collapse: collapse; font-size: 1.8vh; }
        th, td { padding: 1vh; border-bottom: 1px solid #ddd; text-align: left; }
        th { background-color: #002f6c; color: white; }

        /* グラフエリア：横幅を確保しつつ、縦幅を画面内に制限 */
        .chart-section {
            width: 40%;
            height: 80vh; /* 画面縦幅の80%を上限にする */
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        .chart-container {
            width: 100%;
            max-width: 80vh; /* 正方形を保つため高さに合わせる */
            aspect-ratio: 1 / 1;
            position: relative;
        }
        
        .chart-text {
            position: absolute;
            top: 50%; left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 100%;
        }
        
        .text-line1 { font-size: 2.5vh; color: #d32f2f; font-weight: bold; }
        .text-line2 { font-size: 8vh; color: #002f6c; font-weight: bold; line-height: 1; }
        .text-line3 { font-size: 3vh; color: #00bfff; font-weight: bold; }
    </style>
</head>
<body>

    <div class="header">
        <img src="bg-logo.png" alt="Logo">
        <h1>KAS Accident/Incident Information</h1>
    </div>

    <div id="loading" style="font-size: 3vh; padding: 10vh;">読み込み中...</div>

    <div class="main-container" id="main-container" style="display: none;">
        <div class="table-section" id="table-section"></div>
        <div class="chart-section">
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
                <div class="chart-text">
                    <div class="text-line1">制限区域内 無事故日数目標</div>
                    <div class="text-line2"><span id="goal-days-display">...</span>日</div>
                    <div class="text-line3"><span id="current-days-display">...</span>日 継続中！</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRju7RHJ7_5PMGhXmQhcnCs5S6YiAwLY-mVASp8wbhF7l0oCj2PyRN51IAOdoJQGboNAOZiIhNI4mKh/pub?output=csv';
        let myChart = null;

        async function loadData() {
            try {
                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                const text = await response.text();
                const data = text.split(/\r?\n/).map(line => line.split(',').map(c => c.trim().replace(/^"(.*)"$/, '$1')));
                
                // 表生成
                const tableSection = document.getElementById('table-section');
                const createTable = (h, r) => {
                    const t = document.createElement('table');
                    t.innerHTML = `<thead><tr>${h.map(i=>`<th>${i}</th>`).join('')}</tr></thead><tbody>${r.map(row=>`<tr>${row.map(c=>`<td>${c}</td>`).join('')}</tr>`).join('')}</tbody>`;
                    tableSection.appendChild(t);
                };
                if(data[1]) createTable(data[1].slice(0,3), [data[2].slice(0,3)]);
                if(data[4]) createTable(data[4].slice(0,4), [data[5].slice(0,4)]);
                if(data[7]) createTable(data[7].slice(0,3), data.slice(8).filter(r=>r[0]).map(r=>r.slice(0,3)));

                // 数字取得
                const goal = parseInt(data[15][1]);
                const cur = parseInt(data[16][1]);
                document.getElementById('goal-days-display').textContent = goal;
                document.getElementById('current-days-display').textContent = cur;

                // グラフ
                const ctx = document.getElementById('doughnutChart').getContext('2d');
                new Chart(ctx, {
                    type: 'doughnut',
                    data: { datasets: [{ data: [cur, Math.max(0, goal-cur)], backgroundColor: ['#00bfff', '#eee'] }] },
                    options: { cutout: '80%', plugins: { legend: { display: false } } }
                });

                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-container').style.display = 'flex';
            } catch(e) { document.getElementById('loading').textContent = 'エラーが発生しました'; }
        }
        loadData();
    </script>
</body>
</html>
