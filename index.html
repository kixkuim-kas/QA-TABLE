<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KAS Accident/Incident Information</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* すべてのサイズを画面幅（vw）基準にすることで、どんなモニターでも比率を維持します */
        body {
            font-family: 'Helvetica Neue', Arial, 'Hiragino Kaku Gothic ProN', Meiryo, sans-serif;
            background-color: #ffffff;
            color: #333;
            margin: 0;
            padding: 2vw; /* 余白も画面幅に連動 */
            box-sizing: border-box;
            overflow-x: hidden;
        }

        .header {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            margin-bottom: 2vw;
        }
        .header h1 {
            color: #002f6c;
            font-size: 2.8vw; /* タイトルも画面幅に合わせて拡大 */
            margin: 0;
            line-height: 1.2;
        }
        .sub-title {
            color: #002f6c;
            font-size: 1.6vw; /* サブタイトル */
            font-weight: bold;
            margin: 0;
        }
        .header img {
            height: 4vw; /* ロゴの高さ */
            margin-right: 1vw;
        }

        .main-container {
            width: 100%; 
            display: grid;
            /* 左の表エリアと、右のグラフエリア（画面幅の45%に固定）で分割。これではみ出しを防ぎます */
            grid-template-columns: 1fr 45vw; 
            gap: 4vw; 
            align-items: center;
        }

        .table-section {
            min-width: 0; 
            overflow-x: auto; 
        }
        
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 1.1vw; /* 表の文字も大画面では自動的に大きく */
            margin-bottom: 2vw; 
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        th, td {
            text-align: left;
            padding: 1vw 1.2vw;
            border-bottom: 1px solid #e0e0e0;
            white-space: nowrap;
        }
        th {
            background-color: #002f6c;
            color: white;
            font-weight: bold;
        }
        tr:nth-child(even) td {
            background-color: #f2f2f2;
        }
        th:first-child { text-align: left; }
        th:not(:first-child), td:not(:first-child) { text-align: center; }

        /* 右側：グラフエリア */
        .chart-section {
            width: 100%;
            aspect-ratio: 1 / 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            
            background-image: url('bg-logo.png');
            background-repeat: no-repeat;
            background-position: left center; 
            background-size: 140%; /* 背景ロゴのサイズ */
        }

        .chart-container {
            width: 90%; 
            height: 90%;
            position: relative;
            background-color: rgba(255, 255, 255, 0.65); 
            backdrop-filter: blur(3px); 
            border-radius: 50%;
            padding: 1vw;
            box-shadow: 0 4px 15px rgba(0,0,0,0.08);
            box-sizing: border-box;
        }
        canvas {
            width: 100% !important;
            height: 100% !important;
        }

        /* グラフ中央のテキスト */
        .chart-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            width: 95%;
            
            text-shadow: 
                0 0 1vw rgba(255, 255, 255, 1),
                0 0 2vw rgba(255, 255, 255, 1),
                0.2vw 0.2vw 0.5vw rgba(255, 255, 255, 1), 
                -0.2vw -0.2vw 0.5vw rgba(255, 255, 255, 1);
        }
        
        /* ★グラフ内の文字も、画面の横幅（vw）を基準にして確実に大きくします */
        .text-line1 {
            color: #d32f2f;
            font-size: 1.8vw; 
            font-weight: bold;
            line-height: 1.2;
        }
        .text-line2 {
            color: #002f6c;
            font-size: 5.5vw; /* 画面幅の5.5%の大きさ。サイネージなら超特大になります */
            font-weight: bold;
            margin-top: 1vw;
            line-height: 1;
        }
        .text-line3 {
            color: #00bfff;
            font-size: 2.3vw; 
            font-weight: bold;
            margin-top: 1vw;
        }

        @media (max-width: 1000px) {
            .main-container {
                grid-template-columns: 1fr;
            }
            .chart-section {
                width: 90vw;
            }
        }

        .status-message { margin-top: 2vw; font-size: 1.5vw; color: #777; font-weight: bold; }
        .error-msg { color: #d32f2f; }
    </style>
</head>
<body>

    <div class="header">
        <div class="title-with-logo" style="display: flex; align-items: center; margin-top: 0;">
            <img src="bg-logo.png" alt="KAS Logo">
            <div>
                <h1>KAS Accident/Incident Information</h1>
                <div class="sub-title">KANSAI AIRPORTS Aviation Services</div>
            </div>
        </div>
    </div>

    <div id="loading" class="status-message">データを読み込み中...</div>

    <div class="main-container" id="main-container" style="display: none;">
        <div class="table-section" id="table-section"></div>
        
        <div class="chart-section">
            <div class="chart-container">
                <canvas id="doughnutChart"></canvas>
                <div class="chart-text">
                    <div class="text-line1">制限区域内<br>無事故日数目標</div>
                    <div class="text-line2"><span id="goal-days-display">...</span>日 <span style="font-size: 0.3em; vertical-align: middle;">以上</span></div>
                    <div class="text-line3"><span id="current-days-display">...</span>日 継続中！</div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const csvUrl = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vRju7RHJ7_5PMGhXmQhcnCs5S6YiAwLY-mVASp8wbhF7l0oCj2PyRN51IAOdoJQGboNAOZiIhNI4mKh/pub?output=csv';
        let myChart = null;

        function parseCSV(text) {
            const lines = text.split(/\r?\n/);
            return lines.map(line => line.split(',').map(cell => cell.trim().replace(/^"(.*)"$/, '$1')));
        }

        async function loadData() {
            try {
                const response = await fetch(csvUrl + '&t=' + new Date().getTime());
                if (!response.ok) throw new Error('ネットワークエラー');
                const dataText = await response.text();
                const data = parseCSV(dataText);
                updateUI(data);
            } catch (error) {
                console.error(error);
                document.getElementById('loading').innerHTML = '<span class="error-msg">データの取得に失敗しました。</span>';
            }
        }

        function updateUI(data) {
            try {
                const tableSection = document.getElementById('table-section');
                tableSection.innerHTML = ''; 

                function createTable(headers, rows) {
                    const table = document.createElement('table');
                    const thead = document.createElement('thead');
                    const trHead = document.createElement('tr');
                    headers.forEach(text => {
                        const th = document.createElement('th');
                        th.textContent = text;
                        trHead.appendChild(th);
                    });
                    thead.appendChild(trHead);
                    table.appendChild(thead);

                    const tbody = document.createElement('tbody');
                    rows.forEach(row => {
                        const tr = document.createElement('tr');
                        row.forEach(text => {
                            const td = document.createElement('td');
                            td.textContent = text;
                            tr.appendChild(td);
                        });
                        tbody.appendChild(tr);
                    });
                    table.appendChild(tbody);
                    tableSection.appendChild(table);
                }

                if (data[1] && data[2]) createTable(data[1].slice(0, 3), [data[2].slice(0
